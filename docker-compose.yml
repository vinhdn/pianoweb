version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      AUTH_SECRET: ${AUTH_SECRET:-change_this_secret_in_production}
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  uploads_data:
