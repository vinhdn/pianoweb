version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.lesaupiano.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:4000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      AUTH_SECRET: ${AUTH_SECRET:-change_this_secret_in_production}
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`lesaupiano.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3001"

volumes:
  uploads_data:

networks:
  dokploy-network:
    external: true
